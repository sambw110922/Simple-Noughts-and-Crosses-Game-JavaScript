<!DOCTYPE html>
<html lang="en-GB">
    <head>
        <title>Noughts and Crosses Game</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" type="text/css" href="./noughtscrossesstyle.css" />
    </head>

    <body>


        <header>
            <nav>
                <h1>Simple Noughts and Crosses</h1>
                <p>A simple Noughts and Crosses (tic tac toe) game.</p>
            </nav>
        </header>

        <main>
 
            <section id="game">
                <button id="btnPlay">Play!</button>
                <div id="buttonBoard">
                    <div id="row1">
                        <button id="btn0" class="gameButtonNeutral">N</button>
                        <button id="btn1" class="gameButtonNeutral">N</button>
                        <button id="btn2" class="gameButtonNeutral">N</button>
                    </div>
                    <div id="row2">
                        <button id="btn3" class="gameButtonNeutral">N</button>
                        <button id="btn4" class="gameButtonNeutral">N</button>
                        <button id="btn5" class="gameButtonNeutral">N</button>
                    </div>
                    <div id="row3">
                        <button id="btn6" class="gameButtonNeutral">N</button>
                        <button id="btn7" class="gameButtonNeutral">N</button>
                        <button id="btn8" class="gameButtonNeutral">N</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>2026</p>
        </footer>

        <script src="./noughtscrosseslogic.js"></script>

    </body>

</html>
